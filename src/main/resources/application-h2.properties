spring.application.name=PelisApp

# --- H2 profile overrides ---
spring.datasource.url=jdbc:h2:mem:pelisdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Enable H2 console (available at /h2-console when profile h2 is active)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate overrides for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Note: activate with `-Dspring-boot.run.profiles=h2` or `SPRING_PROFILES_ACTIVE=h2`.
